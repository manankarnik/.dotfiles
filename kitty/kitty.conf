# Fonts
font_family     FiraCode Nerd Font
bold_font       auto
italic_font     auto
font_size       16.0

# Window padding
window_padding_width	12.0

# Default program to open urls
open_url_with           chromium

# Cursor shape
cursor_shape            block
cursor_blink_interval   0
shell_integration       no-cursor

# Opacity
background_opacity      0

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
